<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Certificate Member List</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 15px;
      color: #222;
    }
    h2 {
      text-align: center;
      margin-bottom: 10px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 12px;
    }
    th, td {
      border: 1px solid #000;
      padding: 6px;
      vertical-align: top;
      text-align: left;
    }
    th {
      background: #f0f0f0;
      text-align: center;
    }
    a {
      color: #0645ad;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .links-list {
      display: grid;
      gap: 0.3rem;
    }
    .note {
      margin-bottom: 1rem;
      font-size: 0.95rem;
      color: #444;
    }
    @media print {
      body { margin: 0; }
      table { font-size: 10px; }
    }
  </style>
</head>
<body>
  <h2>Certificate Member List</h2>
  <p class="note">This table is populated from <code>certificates.json</code>. It includes the user index, name, user ID, password, number of available documents, and direct download links.</p>
  <table>
    <thead>
      <tr>
        <th>Index</th>
        <th>Name</th>
        <th>UserID</th>
        <th>Password</th>
        <th>Available document no</th>
        <th>Documents download links</th>
      </tr>
    </thead>
    <tbody id="certificate-table-body">
    </tbody>
  </table>
  <script>
    async function loadCertificates() {
      try {
        const response = await fetch('certificates.json');
        if (!response.ok) throw new Error('Unable to load certificates.json');
        const certificates = await response.json();
        const tbody = document.getElementById('certificate-table-body');

        certificates.forEach((user, index) => {
          const row = document.createElement('tr');
          const downloadCount = Array.isArray(user.downloads) ? user.downloads.length : 0;
          const downloadsCell = document.createElement('td');
          const linksWrapper = document.createElement('div');
          linksWrapper.className = 'links-list';

          if (downloadCount > 0) {
            user.downloads.forEach(download => {
              const link = document.createElement('a');
              link.href = download.link;
              link.target = '_blank';
              link.rel = 'noopener';
              link.textContent = download.title;
              linksWrapper.appendChild(link);
            });
          } else {
            linksWrapper.textContent = 'No documents';
          }

          downloadsCell.appendChild(linksWrapper);

          row.innerHTML = `
            <td style="text-align: center;">${index + 1}</td>
            <td>${escapeHtml(user.name || '')}</td>
            <td>${escapeHtml(user.userId || '')}</td>
            <td>${escapeHtml(user.password || '')}</td>
            <td style="text-align: center;">${downloadCount}</td>
          `;
          row.appendChild(downloadsCell);
          tbody.appendChild(row);
        });
      } catch (error) {
        const body = document.body;
        body.innerHTML = '<h2>Error loading certificate data</h2><p>' + error.message + '</p>';
        console.error(error);
      }
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    loadCertificates();
  </script>
</body>
</html>
